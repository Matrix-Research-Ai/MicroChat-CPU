name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
          python -m pip install wandb

      - name: Test imports
        run: |
          python -c "
          from nanochat.cpu_distributed import (
              GradientQuantizer, GradientSparsifier, AdaptiveCommScheduler,
              TopologyAwareCommunicator, NetworkBenchmark,
              HeterogeneousLoadBalancer, StragglerMitigator,
              SyntheticDataLoader, StepProfiler, WANResilienceManager
          )
          print(f'All {10} classes importable')
          "

      - name: Dry-run test (single node)
        run: |
          python -m scripts.cpu_train --synthetic --dry-run --depth=2 \
            --max-seq-len=128 --device-batch-size=2 --total-batch-size=256 \
            --num-iterations=2 --eval-every=-1 2>&1 | tee dryrun.log
          grep -q "PASSED" dryrun.log && echo "✓ Dry-run passed"

      - name: Quick mode test
        run: |
          python -m scripts.cpu_train --quick --num-iterations=3 2>&1 | tee quick.log
          grep -q "Training complete" quick.log && echo "✓ Quick mode complete"

      - name: Profile test
        run: |
          python -m scripts.cpu_train --synthetic --profile --profile-every=5 \
            --depth=2 --max-seq-len=64 --device-batch-size=2 \
            --total-batch-size=128 --num-iterations=6 --eval-every=-1 2>&1 | tee profile.log
          grep -q "STEP TIMING BREAKDOWN" profile.log && echo "✓ Profiling works"

      - name: Checkpoint save/resume test
        run: |
          # Run 4 steps with save every 2
          python -m scripts.cpu_train --synthetic --depth=2 \
            --max-seq-len=64 --device-batch-size=2 --total-batch-size=128 \
            --num-iterations=4 --eval-every=-1 --save-every=2 2>&1 | tee save.log
          # Verify checkpoint files exist
          ls -la ~/.cache/nanochat/cpu_checkpoints/d2/ 2>&1 | tee ckpt.log
          grep -q "latest_step.txt" ckpt.log && echo "✓ Checkpoints created"
          # Check resume step
          cat ~/.cache/nanochat/cpu_checkpoints/d2/latest_step.txt
          echo "✓ Checkpoint/resume test passed"

      - name: Compression mode test
        run: |
          python -m scripts.cpu_train --synthetic --dry-run --depth=2 \
            --max-seq-len=64 --device-batch-size=1 --total-batch-size=64 \
            --num-iterations=2 --eval-every=-1 --compress \
            --sparsify --sparsity-ratio=0.1 2>&1 | tee compress.log
          grep -q "PASSED" compress.log && echo "✓ Compression + sparsification works"

      - name: Async overlap test
        run: |
          python -m scripts.cpu_train --synthetic --dry-run --depth=2 \
            --max-seq-len=64 --device-batch-size=1 --total-batch-size=64 \
            --num-iterations=2 --eval-every=-1 --async-overlap 2>&1 | tee async.log
          grep -q "PASSED" async.log && echo "✓ Async overlap works"

      - name: Heterogeneous mode test (single node — gracefully degrades)
        run: |
          python -m scripts.cpu_train --synthetic --dry-run --depth=2 \
            --max-seq-len=64 --device-batch-size=1 --total-batch-size=64 \
            --num-iterations=2 --eval-every=-1 --hetero 2>&1 | tee hetero.log
          echo "✓ Heterogeneous mode (single-node fallback)"
